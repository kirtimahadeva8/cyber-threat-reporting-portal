{% extends 'base.html' %}

{% block content %}

<div class="row justify-content-center">

<div class="col-md-6">

<div class="card shadow">

<div class="card-body">

<h3 class="text-center mb-4">

Login

</h3>

<form method="POST">

<input type="email"
       name="email"
       class="form-control mb-3"
       placeholder="Email"
       required>

<input type="password"
       name="password"
       class="form-control mb-3"
       placeholder="Password"
       required>

<button class="btn btn-success w-100">

Login

</button>

</form>

<div class="text-center mt-3">

New User?

<a href="/register">

Register

</a>

</div>

</div>

</div>

</div>

</div>

{% endblock %}
