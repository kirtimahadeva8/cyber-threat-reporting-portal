{% extends 'base.html' %}

{% block content %}

<div class="row justify-content-center">

<div class="col-md-6">

<div class="card shadow">

<div class="card-body">

<h3 class="text-center mb-4">
Create Account
</h3>

<form method="POST">

<input type="text"
       name="fullname"
       class="form-control mb-3"
       placeholder="Full Name"
       required>

<input type="email"
       name="email"
       class="form-control mb-3"
       placeholder="Email"
       required>

<input type="password"
       name="password"
       class="form-control mb-3"
       placeholder="Password"
       required>

<button class="btn btn-primary w-100">

Register

</button>

</form>

<div class="text-center mt-3">

Already have account?

<a href="/login">
Login
</a>

</div>

</div>

</div>

</div>

</div>

{% endblock %}
